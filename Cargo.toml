[workspace]
members = [
    "crates/core",
    "crates/mobile",
    "crates/cli",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.80"
authors = ["Vladrus39"]
license = "MIT OR Apache-2.0"

[workspace.dependencies]
tokio = { version = "1.44", features = ["full"] }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
reqwest = { version = "0.12", features = ["json", "stream"] }
futures-util = "0.3"

# Dioxus
dioxus = { version = "0.7", features = ["mobile"] }
dioxus-mobile = "0.7"
dioxus-signals = "0.7"
dioxus-router = "0.7"

deepseek-mobile-core = { path = "crates/core" }
