name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux native dependencies for Dioxus
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libxdo-dev

      - name: Cache cargo registry and build output
        uses: Swatinem/rust-cache@v2

      - name: Check workspace
        run: cargo check --workspace --all-targets

      - name: Test workspace
        run: cargo test --workspace

  android-bridge-static-check:
    name: Android bridge static check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify Android bridge files exist
        run: |
          test -f android/bridge/build.gradle.kts
          test -f android/bridge/src/main/AndroidManifest.xml
          test -f android/bridge/src/main/kotlin/com/deepseek/mobile/bridge/DeepSeekDocumentPickerBridge.kt
          grep -q "ACTION_OPEN_DOCUMENT" android/bridge/src/main/kotlin/com/deepseek/mobile/bridge/DeepSeekDocumentPickerBridge.kt
          grep -q "copyUriToSandbox" android/bridge/src/main/kotlin/com/deepseek/mobile/bridge/DeepSeekDocumentPickerBridge.kt
          test -f android/bridge/src/main/kotlin/com/deepseek/mobile/bridge/DeepSeekTermuxBridge.kt
          grep -q "com.termux.RUN_COMMAND" android/bridge/src/main/kotlin/com/deepseek/mobile/bridge/DeepSeekTermuxBridge.kt
          grep -q 'EXTRA_PLUGIN_RESULT_BUNDLE = "result"' android/bridge/src/main/kotlin/com/deepseek/mobile/bridge/DeepSeekTermuxBridge.kt
          grep -q "com.termux.permission.RUN_COMMAND" android/bridge/src/main/AndroidManifest.xml
          test -f android/bridge/src/main/kotlin/com/deepseek/mobile/bridge/DeepSeekMobileHostCoordinator.kt
          grep -q "NativeBridgeBindings" android/bridge/src/main/kotlin/com/deepseek/mobile/bridge/DeepSeekMobileHostCoordinator.kt
