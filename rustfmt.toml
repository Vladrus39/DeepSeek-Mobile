# DeepSeek-Mobile rustfmt configuration
# Run `cargo fmt --all` to keep the tree consistent.
# This file makes the style explicit and prevents drift across contributors/CI.

edition = "2021"
max_width = 100
use_small_heuristics = "Default"
newline_style = "Unix"
reorder_imports = true
reorder_modules = true
remove_nested_parens = true
use_try_shorthand = true
use_field_init_shorthand = true
